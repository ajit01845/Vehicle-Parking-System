<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkease - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        
        .left-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .left-panel h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .left-panel p {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .right-panel {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .right-panel h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ddd;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .admin-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .admin-link a:hover {
            text-decoration: underline;
        }
        
        .features {
            margin-top: 30px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .feature-item span {
            font-size: 24px;
            margin-right: 15px;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .left-panel {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>Parkease</h1>
            <p>Smart parking management solution for hassle-free vehicle parking. Find, book, and manage parking slots with ease.</p>
            
            <div class="features">
                <div class="feature-item">
                    <span>🚗</span>
                    <span>Real-time slot availability</span>
                </div>
                <div class="feature-item">
                    <span>⚡</span>
                    <span>Quick booking process</span>
                </div>
                <div class="feature-item">
                    <span>💰</span>
                    <span>Transparent pricing</span>
                </div>
                <div class="feature-item">
                    <span>🔒</span>
                    <span>Secure parking</span>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <h2>Get Started</h2>
            
            <div class="btn-group">
                <a href="{% url 'user_login' %}" class="btn btn-primary">Sign In</a>
                <a href="{% url 'register' %}" class="btn btn-secondary">Sign Up</a>
            </div>
            
            <div class="divider">OR</div>
            
            <div class="admin-link">
                <a href="/admin/">Admin Portal →</a>
            </div>
        </div>
    </div>
</body>
</html>
